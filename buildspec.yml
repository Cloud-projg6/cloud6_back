version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
  build:
    commands:
      # cd book-server 제거 (루트에서 바로 빌드)
      - chmod +x ./mvnw
      - ./mvnw clean package
  post_build:
    commands:
      - echo "Build completed."

artifacts:
  files:
    # 경로를 target/*.jar 로 수정 (루트에 target이 바로 있다고 가정)
    - target/*.jar
  discard-paths: yes