version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
  build:
    commands:
      - echo "Building the Spring Boot application..."
      - mvn clean package -DskipTests
  post_build:
    commands:
      - echo "Build completed."

artifacts:
  files:
    - target/*.jar
    - appspec.yml
    - scripts/**
  discard-paths: no