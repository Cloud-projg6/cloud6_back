version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
  build:
    commands:
      - echo "Build Start"
      - mvn clean package -DskipTests
  post_build:
    commands:
      - echo "Build Completed"

artifacts:
  files:
      - '**/*'
      - appspec.yml
      - scripts/**/*
  discard-paths: yes