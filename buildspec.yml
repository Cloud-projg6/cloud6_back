version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
  build:
    commands:
      - echo "Current directory:"
      - ls -R  # 프로젝트 내부 구조를 로그로 출력해서 확인
      - cd book-server  # 확실히 폴더로 이동
      - chmod +x ./mvnw
      - ./mvnw clean package
  post_build:
    commands:
      - echo "Build completed."

artifacts:
  files:
    - book-server/target/*.jar
  discard-paths: yes