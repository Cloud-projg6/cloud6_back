version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
  pre_build:
    commands:
      # 주석 처리된 빈 scripts 폴더가 없을 수 있으므로 안전하게 폴더를 먼저 생성합니다.
      - mkdir -p scripts
      # AWS CodeBuild에 등록한 JWT_SECRET 환경변수 값을 env.sh 파일로 저장
      - echo "export JWT_SECRET=${JWT_SECRET}" > scripts/env.sh
      - chmod +x scripts/env.sh
  build:
    commands:
      - echo Build started on `date`
      - mvn clean package -DskipTests
artifacts:
  files:
    - 'target/*.jar'
    - 'appspec.yml'
    - 'scripts/**/*'
  discard-paths: no  # 폴더 구조(scripts/ 구조 등)를 그대로 유지하며 압축하는 옵션
