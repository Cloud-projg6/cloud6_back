version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17

  build:
    commands:
      - echo Build started
      - chmod +x mvnw || true
      - ./mvnw clean package -DskipTests || mvn clean package -DskipTests

artifacts:
  files:
    - appspec.yml
    - scripts/**
    - target/*.jar