version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
  build:
    commands:
      - echo Build started on `date`
      # 윈도우/리눅스 래퍼 파일 이슈를 피하기 위해 내장된 mvn 명령어로 직접 빌드합니다.
      - mvn clean package -DskipTests
artifacts:
  files:
    # 스크린샷의 target 폴더 안에 생성된 jar 파일명을 매핑합니다.
    - 'target/*.jar'
    - 'appspec.yml'      # Day 2 배포용 (현재 루트에 빈 파일로 만들어만 두세요)
    - 'scripts/**/*'     # Day 2 배포용 (현재 루트에 빈 폴더로 만들어만 두세요)
  discard-paths: no  # 폴더 구조(scripts/ 구조 등)를 그대로 유지하며 압축하라는 옵션입니다.