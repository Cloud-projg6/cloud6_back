version: 0.0
os: linux
files:
  - source: /
    destination: /home/ec2-user/app
permissions:
  - object: /home/ec2-user/app
    pattern: '**'
    mode: '0755'
    owner: ec2-user
    group: ec2-user
    type:
      - file
      - directory
hooks:
  ApplicationStart:
    - location: deploy-scripts/start.sh
      timeout: 300
      runas: ec2-user