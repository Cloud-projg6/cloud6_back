version: 0.0
os: linux
files:
  - source: /
    destination: /home/ubuntu/app   # EC2 내부에 Jar 파일이 저장될 경로
hooks:
  ApplicationStop:
    - location: scripts/stop_server.sh
      timeout: 60
      runas: ubuntu
  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 60
      runas: ubuntu